name: Build IPQ6K EMMC

on:
  workflow_run:
    workflows: ["Auto-Clean"]
    types:
      - completed
  workflow_dispatch:

permissions: write-all

jobs:
  modify-and-create-pr:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Modify QCA-ALL to QCA-EMMC
      run: |
        # 生成临时文件
        cp .github/workflows/QCA-ALL.yml .github/workflows/QCA-EMMC.yml

        # 修改名称
        sed -i 's/name: QCA-ALL/name: QCA-EMMC/' .github/workflows/QCA-EMMC.yml
        
        # 修改TARGET值
        sed -i 's/TARGET: \[IPQ60XX-WIFI-YES, IPQ60XX-WIFI-NO, IPQ807X-WIFI-YES, IPQ807X-WIFI-NO\]/TARGET: \[IPQ60XX-EMMC-WIFI-YES, IPQ60XX-EMMC-WIFI-NO\]/' .github/workflows/QCA-EMMC.yml

    - name: Print modified workflow
      run: |
        echo "==== Modified Workflow ===="
        cat .github/workflows/QCA-EMMC.yml

    - name: Create new branch
      env:
        BRANCH_NAME: add-qca-emmc-workflow
      run: |
        git checkout -b $BRANCH_NAME
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .github/workflows/QCA-EMMC.yml
        git commit -m "Add QCA-EMMC workflow for temporary use"
        git push origin $BRANCH_NAME

    - name: Create Pull Request
      id: create_pr
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GH_TOKEN }}
        branch: add-qca-emmc-workflow
        title: "Add QCA-EMMC workflow"
        body: |
          This PR adds the QCA-EMMC workflow for temporary use.
          Changes include:
          - Workflow name updated from "QCA-ALL" to "QCA-EMMC".
          - TARGET modified to only include "IPQ60XX-EMMC-WIFI-YES" and "IPQ60XX-EMMC-WIFI-NO".
        labels:
          - workflow
          - automation
        reviewers:
          - ysuolmai

    - name: Automatically merge PR
      if: success() && steps.create_pr.outputs.pull-request-url
      uses: actions/github-script@v6
      env:
        PR_URL: ${{ steps.create_pr.outputs.pull-request-url }}
      with:
        script: |
          const prNumber = parseInt('${{ env.PR_URL }}'.split('/').pop());
          const mergeResult = await github.rest.pulls.merge({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: prNumber,
            merge_method: 'merge' // 可选: merge, squash, rebase
          });
          if (!mergeResult.data.merged) {
            throw new Error(`Failed to merge PR: ${mergeResult.data.message}`);
          } else {
            console.log(`PR #${prNumber} merged successfully.`);
          }
